services:

  # ── Rust sampler + REST API ──────────────────────────────────────────────────
  logflayer:
    build:
      context: .
      dockerfile: Dockerfile
    image: logflayer:latest
    container_name: logflayer
    restart: unless-stopped
    env_file: .env
    environment:
      # These can be overridden in .env or via shell env vars
      RUN_MODE: ${RUN_MODE:-periodic}
      POLL_INTERVAL_SECS: ${POLL_INTERVAL_SECS:-300}
      API_PORT: "8080"
      LOG_DIRECTORY: /app/logs
    ports:
      - "${API_PORT:-8080}:8080"       # REST API
      - "${METRICS_PORT:-9090}:9090"   # Prometheus metrics
    volumes:
      - logflayer_logs:/app/logs       # Persist log files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - logflayer_net

  # ── Vue UI served by nginx ───────────────────────────────────────────────────
  logflayer-ui:
    build:
      context: ./logflayer-ui
      dockerfile: Dockerfile
    image: logflayer-ui:latest
    container_name: logflayer-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:80"          # Browse at http://localhost:3000
    depends_on:
      logflayer:
        condition: service_healthy
    networks:
      - logflayer_net

volumes:
  logflayer_logs:

networks:
  logflayer_net:
    driver: bridge
